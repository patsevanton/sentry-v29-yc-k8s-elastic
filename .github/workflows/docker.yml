name: Release and Docker

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Semver Release
        id: semver
        uses: huggingface/semver-release-action@latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print version and tag
        run: |
          echo "Version: ${{ steps.semver.outputs.version }}"
          echo "Tag:     ${{ steps.semver.outputs.tag }}"

  docker:
    needs: release
    if: needs.release.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: demo-node
            context: demo/demo-nodejs
            dockerfile: demo/demo-nodejs/Dockerfile
          - image: demo-python
            context: demo/demo-python
            dockerfile: demo/demo-python/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.image }}-${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ matrix.image }}-latest

