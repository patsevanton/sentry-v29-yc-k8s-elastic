# DSN для Node demo. Подставьте dsn или создайте secret из CLI:
#   kubectl create secret generic sentry-dsn-node -n demo-node \
#     --from-literal=dsn='https://<key>@<host>/<project>'
#
# Не коммитьте файл с реальным DSN.
#
apiVersion: v1
kind: Secret
metadata:
  name: sentry-dsn-node
  namespace: demo-nodejs
type: Opaque
stringData:
  dsn: "REPLACE_WITH_YOUR_SENTRY_DSN_NODE"
