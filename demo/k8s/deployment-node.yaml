# Образ: соберите и поменяйте image при необходимости, например:
#   docker build -t ghcr.io/patsevanton/sentry-v29-yc-k8s-elastic:demo-node-1.7.0 -f demo/node/Dockerfile demo/node
#   docker push ghcr.io/patsevanton/sentry-v29-yc-k8s-elastic:demo-node-1.7.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-demo-node
  namespace: demo-sentry
  labels:
    app: sentry-demo-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentry-demo-node
  template:
    metadata:
      labels:
        app: sentry-demo-node
    spec:
      containers:
        - name: app
          image: ghcr.io/patsevanton/sentry-v29-yc-k8s-elastic:demo-node-1.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-dsn-node
                  key: dsn
            # Периодическая отправка demo-исключений в Sentry (0 — выключить)
            - name: DEMO_AUTO_EXCEPTION_INTERVAL_SEC
              value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              memory: "48Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "150m"
