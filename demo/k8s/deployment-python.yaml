# Образ: соберите и поменяйте image при необходимости, например:
#   docker build -t ghcr.io/<user>/sentry-demo-python:v1 -f demo/python/Dockerfile demo/python
#   docker push ghcr.io/<user>/sentry-demo-python:v1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-demo-python
  namespace: demo-sentry
  labels:
    app: sentry-demo-python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentry-demo-python
  template:
    metadata:
      labels:
        app: sentry-demo-python
    spec:
      containers:
        - name: app
          image: sentry-demo-python:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-dsn
                  key: dsn
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "500m"
