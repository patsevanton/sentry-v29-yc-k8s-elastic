# Образ: соберите и поменяйте image при необходимости, например:
#   docker build -t ghcr.io/patsevanton/sentry-v29-yc-k8s-elastic:demo-python-1.5.0 -f demo/python/Dockerfile demo/python
#   docker push ghcr.io/patsevanton/sentry-v29-yc-k8s-elastic:demo-python-1.5.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-demo-python
  namespace: demo-sentry
  labels:
    app: sentry-demo-python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentry-demo-python
  template:
    metadata:
      labels:
        app: sentry-demo-python
    spec:
      containers:
        - name: app
          image: ghcr.io/patsevanton/sentry-v29-yc-k8s-elastic:demo-python-1.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-dsn-python
                  key: dsn
            # Периодическая отправка demo-исключений в Sentry (0 — выключить)
            - name: DEMO_AUTO_EXCEPTION_INTERVAL_SEC
              value: "60"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "500m"
