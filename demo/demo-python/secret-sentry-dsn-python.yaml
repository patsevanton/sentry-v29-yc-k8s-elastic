# DSN для Python demo. Подставьте dsn или создайте secret из CLI:
#   kubectl create secret generic sentry-dsn-python -n demo-sentry \
#     --from-literal=dsn='https://<key>@<host>/<project>'
#
# Не коммитьте файл с реальным DSN.
#
apiVersion: v1
kind: Secret
metadata:
  name: sentry-dsn-python
  namespace: demo-sentry
type: Opaque
stringData:
  dsn: "REPLACE_WITH_YOUR_SENTRY_DSN_PYTHON"
