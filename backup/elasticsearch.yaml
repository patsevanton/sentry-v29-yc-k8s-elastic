# Elasticsearch 9.x через ECK (Elastic Cloud on Kubernetes).
# Перед применением установите оператор: см. README.md § 1.1.
# Bootstrap ES: vm.max_map_count >= 262144 — initContainer ниже (privileged).
#
# Распределение по зонам Yandex Cloud (см. net.tf): ru-central1-a/b/d.
# Три master+data узла, zone awareness + привязка подов к зонам — при потере зоны A
# остаются узлы в B и D (кворум мастеров и реплики шардов в других зонах).
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  # Имя CR — ссылка из манифестов Sentry; отдельный namespace изолирует ресурсы Elasticsearch.
  name: sentry-nodestore
  namespace: elasticsearch
spec:
  # Версия образа Elasticsearch, которую разворачивает ECK.
  version: 9.3.2
  # Без самоподписанного сертификата ECK на HTTP (доступ обычно внутри кластера); при необходимости TLS настраивается отдельно.
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  # DeleteOnScaledownOnly: при удалении CR Elasticsearch PVC не трогаются (данные остаются для повторного
  # подключения). При уменьшении count в nodeSet (scale down) PVC для подов, которые больше не нужны,
  # удаляются — то же поведение, что было у ECK до политики «сохранять PVC при удалении кластера».
  volumeClaimDeletePolicy: DeleteOnScaledownOnly
  # Rolling updates: не более одного недоступного пода; без временного «наддува» подов.
  updateStrategy:
    changeBudget:
      maxUnavailable: 1
      maxSurge: 0
  # Voluntary disruptions (drain, kubectl delete pod): минимум 2 из 3 подов доступны.
  podDisruptionBudget:
    spec:
      minAvailable: 2
  nodeSets:
    - name: zone-a
      count: 1
      config:
        # Один узел совмещает master, data и ingest.
        node.roles: ["master", "data", "ingest"]
        # Атрибут зоны + allocation awareness — шарды раскладываются по AZ (см. force.zone ниже).
        node.attr.zone: ru-central1-a
        cluster.routing.allocation.awareness.attributes: zone
        cluster.routing.allocation.awareness.force.zone.values: ru-central1-a,ru-central1-b,ru-central1-d
        # --- Пороги заполнения диска (disk watermarks), доля занятого места на data-томе узла ---
        # low: пока использование диска НИЖЕ этого порога, узел может принимать новые шарды. При
        #      превышении low на узел больше не аллоцируют новые первичные/реплики — «мягкое» сдерживание.
        # high: при превышении кластер старается ПЕРЕНЕСТИ уже существующие шарды на другие data-узлы
        #       (если аллокация это позволяет: есть свободные узлы, зона awareness, реплики и т.д.).
        # flood_stage: критический уровень — индексы с шардами на этом узле получают блокировку записи
        #              (read-only / flood), чтобы не добить диск до 100% и не повредить данные. После
        #              освобождения места блок снимается API или автоматически при следующей проверке.
        # Значения ниже одинаковы во всех nodeSets; при смене тома/нагрузки подберите свои проценты.
        cluster.routing.allocation.disk.watermark.low: "85%"
        cluster.routing.allocation.disk.watermark.high: "90%"
        cluster.routing.allocation.disk.watermark.flood_stage: "95%"
        # Встроенная security ES отключена; границы доверия — сеть/Kubernetes и конфиг Sentry.
        xpack.security.enabled: false
        xpack.security.enrollment.enabled: false
      podTemplate:
        metadata: &es-pod-metadata
          labels:
            app.kubernetes.io/name: elasticsearch
            app.kubernetes.io/instance: sentry-nodestore
            app.kubernetes.io/component: nodestore
        spec:
          affinity:
            # Под планируется только на ноды этой зоны Yandex Cloud.
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: topology.kubernetes.io/zone
                        operator: In
                        values:
                          - ru-central1-a
            # По возможности не несколько подов кластера на одном worker (soft).
            podAntiAffinity: &es-pod-anti-affinity
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        elasticsearch.k8s.elastic.co/cluster-name: sentry-nodestore
                    topologyKey: kubernetes.io/hostname
          # См. заголовок файла: sysctl vm.max_map_count (privileged).
          initContainers: &es-init-sysctl
            - name: sysctl-max-map-count
              image: docker.io/library/busybox:1.36
              securityContext:
                privileged: true
              command:
                - sh
                - -c
                - sysctl -w vm.max_map_count=262144
              resources:
                requests:
                  cpu: 5m
                  memory: 8Mi
                limits:
                  memory: 32Mi
          containers: &es-container
            - name: elasticsearch
              # Готовность по TCP-порту HTTP API (9200).
              readinessProbe:
                tcpSocket:
                  port: 9200
                initialDelaySeconds: 10
                periodSeconds: 5
                timeoutSeconds: 5
                failureThreshold: 12
              # JVM heap (-Xms/-Xmx): Elasticsearch 7.11+ выставляет автоматически от доступной
              # памяти контейнера; в Kubernetes это обычно resources.limits.memory (см. ECK / heap).
              # Без limits cgroup может не ограничивать память — JVM часто видит память всей ноды,
              # heap становится непредсказуемым, возможны OOM и конфликты с другими подами.
              resources:
                requests:
                  cpu: "500m"
                  memory: 2Gi
                limits:
                  memory: 2Gi
      # RWO-том на под; сетевой HDD YC — при росте данных увеличьте storage.
      volumeClaimTemplates: &es-pvc
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: yc-network-hdd
            resources:
              requests:
                storage: 20Gi  # начальный размер тома на узел

    # Конфигурация как у zone-a; зона ru-central1-b.
    - name: zone-b
      count: 1
      config:
        node.roles: ["master", "data", "ingest"]
        node.attr.zone: ru-central1-b
        cluster.routing.allocation.awareness.attributes: zone
        cluster.routing.allocation.awareness.force.zone.values: ru-central1-a,ru-central1-b,ru-central1-d
        # Пороги диска — см. блок комментариев у zone-a (disk watermark low / high / flood_stage).
        cluster.routing.allocation.disk.watermark.low: "85%"
        cluster.routing.allocation.disk.watermark.high: "90%"
        cluster.routing.allocation.disk.watermark.flood_stage: "95%"
        xpack.security.enabled: false
        xpack.security.enrollment.enabled: false
      podTemplate:
        metadata: *es-pod-metadata
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: topology.kubernetes.io/zone
                        operator: In
                        values:
                          - ru-central1-b
            podAntiAffinity: *es-pod-anti-affinity
          initContainers: *es-init-sysctl
          containers: *es-container
      volumeClaimTemplates: *es-pvc

    # Конфигурация как у zone-a; зона ru-central1-d.
    - name: zone-d
      count: 1
      config:
        node.roles: ["master", "data", "ingest"]
        node.attr.zone: ru-central1-d
        cluster.routing.allocation.awareness.attributes: zone
        cluster.routing.allocation.awareness.force.zone.values: ru-central1-a,ru-central1-b,ru-central1-d
        # Пороги диска — см. блок комментариев у zone-a (disk watermark low / high / flood_stage).
        cluster.routing.allocation.disk.watermark.low: "85%"
        cluster.routing.allocation.disk.watermark.high: "90%"
        cluster.routing.allocation.disk.watermark.flood_stage: "95%"
        xpack.security.enabled: false
        xpack.security.enrollment.enabled: false
      podTemplate:
        metadata: *es-pod-metadata
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: topology.kubernetes.io/zone
                        operator: In
                        values:
                          - ru-central1-d
            podAntiAffinity: *es-pod-anti-affinity
          initContainers: *es-init-sysctl
          containers: *es-container
      volumeClaimTemplates: *es-pvc
