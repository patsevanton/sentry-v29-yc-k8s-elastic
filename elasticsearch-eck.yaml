# Elasticsearch 9.x через ECK (Elastic Cloud on Kubernetes).
# Перед применением установите оператор: см. README.md § 1.1.
# На нодах нужен vm.max_map_count >= 262144: сначала kubectl apply -f elasticsearch-node-sysctl.yaml
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: sentry-nodestore
  namespace: elasticsearch
spec:
  version: 9.3.2
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  nodeSets:
    - name: default
      count: 1
      config:
        node.roles: ["master", "data", "ingest"]
        xpack.security.enabled: false
        xpack.security.enrollment.enabled: false
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              # При http.tls отключён ECK по умолчанию ждёт порт 8080; без TLS слушает только 9200.
              readinessProbe:
                tcpSocket:
                  port: 9200
                initialDelaySeconds: 10
                periodSeconds: 5
                timeoutSeconds: 5
                failureThreshold: 12
              resources:
                requests:
                  cpu: "500m"
                  memory: 2Gi
                limits:
                  memory: 2Gi
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms1g -Xmx1g"
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: yc-network-hdd
            resources:
              requests:
                storage: 20Gi
