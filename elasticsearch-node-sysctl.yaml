# Elasticsearch bootstrap check: vm.max_map_count must be >= 262144 on the node.
# Apply before elasticsearch-eck.yaml. Privileged sysctl + hostNetwork/hostPID sets kernel param on the node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: elasticsearch-vm-max-map-count
  namespace: kube-system
  labels:
    app.kubernetes.io/name: elasticsearch-vm-max-map-count
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch-vm-max-map-count
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch-vm-max-map-count
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: sysctl
          image: docker.io/library/busybox:1.36
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              sysctl -w vm.max_map_count=262144
              exec sleep infinity
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              memory: 32Mi
