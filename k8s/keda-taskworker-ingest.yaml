apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: taskworker-ingest
  namespace: sentry
spec:
  scaleTargetRef:
    name: sentry-taskworker-ingest
  minReplicaCount: 1
  maxReplicaCount: 8
  pollingInterval: 30
  cooldownPeriod: 600
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://vmsingle-vmks-victoria-metrics-k8s-stack.vmks.svc.cluster.local:8428
        query: >-
          sum(kafka_group_topic_partition_lag{
            service="managed-kafka",
            group="taskworker-ingest",
            topic="taskworker-ingest"
          })
        threshold: "1000"
        activationThreshold: "100"
    - type: cpu
      metricType: Utilization
      metadata:
        value: "80"
    - type: memory
      metricType: Utilization
      metadata:
        value: "80"
