# VMServiceScrape для встроенного Prometheus-endpoint ClickHouse.
# ВНИМАНИЕ: Prometheus-endpoint НЕ включён в ClickHouseInstallation по умолчанию.
# Для активации добавить settings в spec.configuration (см. todo.md):
#   prometheus/port: "9363"
#   prometheus/metrics: "true"
#   prometheus/events: "true"
#   prometheus/asynchronous_metrics: "true"
# Манифест размещается в namespace vmks (где работает VMAgent из VictoriaMetrics K8s Stack).
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: clickhouse-server
  namespace: vmks
spec:
  namespaceSelector:
    matchNames:
      - clickhouse
  selector:
    matchLabels:
      clickhouse.altinity.com/chi: sentry-clickhouse
  endpoints:
    - port: prometheus
      scrape_interval: 30s
      scrapeTimeout: 25s
      path: /metrics
