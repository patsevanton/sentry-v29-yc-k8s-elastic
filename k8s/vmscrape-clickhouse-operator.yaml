# VMServiceScrape для clickhouse-operator metrics endpoint.
# Operator exposes Prometheus metrics on port 8888 at /metrics.
# Манифест размещается в namespace vmks (где работает VMAgent из VictoriaMetrics K8s Stack).
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: clickhouse-operator
  namespace: vmks
spec:
  namespaceSelector:
    matchNames:
      - clickhouse-operator
  selector:
    matchLabels:
      app.kubernetes.io/name: altinity-clickhouse-operator
  endpoints:
    - port: op-metrics
      scrape_interval: 30s
      scrapeTimeout: 25s
