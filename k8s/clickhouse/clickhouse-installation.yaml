apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: sentry-clickhouse
  namespace: clickhouse
spec:
  configuration:
    users:
      default/networks/ip:
        - "0.0.0.0/0"
    files:
      config.d/init-sentry.xml: |
        <clickhouse>
          <startup_scripts>
            <scripts>
              <query>CREATE DATABASE IF NOT EXISTS sentry</query>
            </scripts>
          </startup_scripts>
        </clickhouse>
      config.d/prometheus.xml: |
        <clickhouse>
          <prometheus>
            <endpoint>/metrics</endpoint>
            <port>9363</port>
            <metrics>true</metrics>
            <events>true</events>
            <asynchronous_metrics>true</asynchronous_metrics>
          </prometheus>
        </clickhouse>
    clusters:
      - name: single-node
        layout:
          shardsCount: 1
          replicasCount: 1
        templates:
          serviceTemplate: clickhouse-metrics
  templates:
    podTemplates:
      - name: clickhouse-single-node
        spec:
          containers:
            - name: clickhouse
              image: altinity/clickhouse-server:25.3.6.10034.altinitystable
              ports:
                - name: prometheus
                  containerPort: 9363
    serviceTemplates:
      - name: clickhouse-metrics
        spec:
          ports:
            - name: prometheus
              port: 9363
          type: ClusterIP
  defaults:
    templates:
      podTemplate: clickhouse-single-node
