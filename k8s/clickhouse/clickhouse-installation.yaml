apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: sentry-clickhouse
  namespace: clickhouse
spec:
  configuration:
    users:
      default/networks/ip:
        - "0.0.0.0/0"
    clusters:
      - name: single-node
        layout:
          shardsCount: 1
          replicasCount: 1
  templates:
    podTemplates:
      - name: clickhouse-single-node
        spec:
          containers:
            - name: clickhouse
              image: altinity/clickhouse-server:25.3.6.10034.altinitystable
              lifecycle:
                postStart:
                  exec:
                    command:
                      - /bin/bash
                      - -c
                      - |
                        for i in $(seq 1 30); do
                          clickhouse-client -q "CREATE DATABASE IF NOT EXISTS sentry" && exit 0
                          sleep 2
                        done
                        exit 1
  defaults:
    templates:
      podTemplate: clickhouse-single-node
