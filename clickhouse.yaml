# Отказоустойчивая конфигурация ClickHouse для Sentry v29 (Altinity ClickHouse Operator):
# - 2 шарда x 2 реплики
# - внешний ClickHouse Keeper (см. clickhouse-keeper.yaml)
# Документация: https://github.com/sentry-kubernetes/charts/blob/develop/charts/sentry/docs/external-clickhouse.md
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: sentry-clickhouse
  namespace: clickhouse
spec:
  configuration:
    zookeeper:
      nodes:
        - host: keeper-clickhouse-keeper.clickhouse.svc.cluster.local
          port: 2181
    clusters:
      - name: sentry-cluster
        layout:
          shardsCount: 2
          replicasCount: 2
    users:
      default/networks/ip:
        - "0.0.0.0/0" # Доступ с подов Sentry
  defaults:
    templates:
      podTemplate: clickhouse
      dataVolumeClaimTemplate: data-volume
  templates:
    podTemplates:
      - name: clickhouse
        spec:
          containers:
            - name: clickhouse
              image: altinity/clickhouse-server:25.3.8.10042.altinitystable
    volumeClaimTemplates:
      - name: data-volume
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
