# Elasticsearch для nodestore Sentry (legacy: только чарт elastic/elasticsearch 8.5.1, образ ES 8.5.x).
# Для Elasticsearch 9.x используйте ECK и elasticsearch-eck.yaml — см. elasticsearch.md.
# Сервис HTTP: <clusterName>-<nodeGroup> в namespace релиза, например sentry-nodestore-master.
clusterName: sentry-nodestore
nodeGroup: master
masterService: ""

roles:
  - master
  - data
  - data_content
  - ingest

replicas: 1
minimumMasterNodes: 1

# Одна реплика — не требовать разнесения по узлам
antiAffinity: soft

esJavaOpts: "-Xms1g -Xmx1g"

# Внутрикластерный сценарий без TLS и пароля (только при изоляции сети; в продакшене включите security).
protocol: http
createCert: false

esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
    xpack.security.enrollment.enabled: false

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  storageClassName: yc-network-ssd
  resources:
    requests:
      storage: 20Gi

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    memory: "2Gi"

sysctlInitContainer:
  enabled: true
